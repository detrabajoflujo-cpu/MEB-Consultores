# Spring Boot — Configuración CRM
spring.application.name=ecosistema-crm

# ==========================================
# Base de Datos PostgreSQL
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crm_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crm_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crm_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Servidor
# ==========================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# ==========================================
# Subida de Archivos (para documentos OCR)
# ==========================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================
# Google APIs
# ==========================================
google.credentials.path=${GOOGLE_APPLICATION_CREDENTIALS:credentials/google-service-account.json}
google.drive.root-folder-id=${GOOGLE_DRIVE_FOLDER_ID:}
google.sheets.spreadsheet-id=${GOOGLE_SHEETS_ID:}

# ==========================================
# WhatsApp Cloud API
# ==========================================
whatsapp.token=${WHATSAPP_TOKEN:}
whatsapp.phone-id=${WHATSAPP_PHONE_ID:}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:crm_verify_2024}
whatsapp.api-url=https://graph.facebook.com/v19.0

# ==========================================
# OpenAI (Vision / OCR)
# ==========================================
openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o
openai.api-url=https://api.openai.com/v1

# ==========================================
# Anthropic Claude (alternativa)
# ==========================================
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-3-5-sonnet-20241022

# ==========================================
# Bland.ai (Llamadas de voz IA)
# ==========================================
bland.api-key=${BLAND_AI_KEY:}
bland.api-url=https://api.bland.ai/v1

# ==========================================
# Logging
# ==========================================
logging.level.com.crm=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
